# docker-compose.yml
# Orquesta todos los servicios del pipeline IoT de Spotify:
#   - Mosquitto: broker MQTT que recibe los mensajes del productor
#   - PostgreSQL: base de datos relacional donde el consumidor persiste los datos
#   - Grafana: visualización automática con datasource y dashboard pre-provisionados
#   - Airflow webserver + scheduler: orquestación del DAG ETL (extract → transform → load)
#   - producer: lee el CSV y la API de Spotify y publica en MQTT
#   - consumer: suscrito al broker MQTT, persiste en PostgreSQL calculando party_index

version: "3.9"

x-airflow-common: &airflow-common
  # Imagen base de Airflow con dependencias del proyecto añadidas
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Credenciales de la API de Spotify inyectadas como variables de entorno
    SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
    SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    # Conexión a PostgreSQL para el DAG
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Broker MQTT
    MQTT_BROKER: mosquitto
    MQTT_PORT: 1883
  volumes:
    # Los DAGs se montan en caliente; cualquier cambio es visible sin reiniciar
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - iot_net

services:

  # ---------------------------------------------------------------------------
  # Broker MQTT
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"   # MQTT sin TLS (uso interno en la red Docker)
      - "9001:9001"   # WebSocket MQTT (opcional, útil para depuración web)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - iot_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Base de datos relacional
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización: crea el esquema la primera vez que arranca el contenedor
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Visualización: Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      # Permite que Grafana lea variables de entorno en los archivos de provisioning
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      # Datasource PostgreSQL provisionado automáticamente al arrancar
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Dashboard JSON provisionado automáticamente al arrancar
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow — inicialización de la BD de metadatos (se ejecuta una sola vez)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create
          --username ${AIRFLOW_ADMIN_USER}
          --password ${AIRFLOW_ADMIN_PASSWORD}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow — servidor web (UI en http://localhost:8080)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow — scheduler (ejecuta los DAGs según su schedule)
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Productor MQTT: lee el CSV y llama a la API de Spotify
  # ---------------------------------------------------------------------------
  producer:
    build:
      context: ./src/producer
      dockerfile: Dockerfile
    container_name: spotify_producer
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_TOPIC}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      # Intervalo en segundos entre publicaciones del CSV
      CSV_PUBLISH_INTERVAL: ${CSV_PUBLISH_INTERVAL:-5}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - mosquitto
    networks:
      - iot_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Consumidor MQTT: recibe mensajes y los persiste en PostgreSQL
  # ---------------------------------------------------------------------------
  consumer:
    build:
      context: ./src/consumer
      dockerfile: Dockerfile
    container_name: spotify_consumer
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_TOPIC}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - iot_net
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volúmenes persistentes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  grafana_data:
  mosquitto_data:
  mosquitto_logs:
  airflow_logs:

# ---------------------------------------------------------------------------
# Red interna: todos los servicios se comunican por nombre de contenedor
# ---------------------------------------------------------------------------
networks:
  iot_net:
    driver: bridge
