# mosquitto.conf
# Configuración del broker MQTT Mosquitto.
# En entorno de producción se añadiría autenticación con password_file y TLS.
# Para el entorno de desarrollo Docker, se permite conexión anónima en la red interna.

# Listener principal MQTT sobre TCP
listener 1883
# Permitir conexiones sin usuario/contraseña (solo válido en red Docker interna)
allow_anonymous true

# Listener adicional WebSocket (útil para depuración desde el navegador)
listener 9001
protocol websockets
allow_anonymous true

# Persistencia de mensajes en disco (útil si el broker se reinicia)
persistence true
persistence_location /mosquitto/data/

# Log de actividad del broker
log_dest file /mosquitto/log/mosquitto.log
log_type all
