# ============================================================
# Configuración de Eclipse Mosquitto 2.0
# ============================================================

# Escucha en el puerto MQTT estándar (TCP)
listener 1883

# Permite conexiones sin usuario/contraseña
# (aceptable para desarrollo local)
allow_anonymous true

# Persistencia de mensajes entre reinicios del broker
persistence true
persistence_location /mosquitto/data/

# Logs: tanto a fichero como a stdout (visible con docker logs)
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Nivel de log: error, warning, notice, information, debug
log_type error
log_type warning
log_type notice
log_type information

# Número máximo de conexiones simultáneas (0 = sin límite)
max_connections -1
