# .github/workflows/ci.yml
# Pipeline de CI/CD con GitHub Actions.
#
# Se ejecuta en cada push y pull request a las ramas main y develop.
#
# Fases:
#   1. lint   — pre-commit (Black, isort, Flake8, Bandit, Gitleaks)
#   2. test   — pytest con cobertura mínima del 70%
#   3. build  — construye las imágenes Docker del productor y consumidor
#
# Para que el pipeline funcione, añade los siguientes secretos en
# Settings → Secrets and variables → Actions del repositorio:
#   - SPOTIFY_CLIENT_ID
#   - SPOTIFY_CLIENT_SECRET

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ---------------------------------------------------------------------------
  # Fase 1: Lint y análisis de seguridad
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          # Necesario para que Gitleaks analice el historial completo
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar pre-commit
        run: pip install pre-commit

      - name: Cachear entornos de pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Ejecutar todos los hooks de pre-commit
        run: pre-commit run --all-files

  # ---------------------------------------------------------------------------
  # Fase 2: Tests unitarios
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      # PostgreSQL de prueba para los tests de integración del consumidor
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias de test
        run: |
          pip install pytest pytest-cov
          pip install -r src/producer/requirements.txt
          pip install -r src/consumer/requirements.txt

      - name: Aplicar esquema de PostgreSQL para tests
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d test_db -f postgres/init/01_schema.sql

      - name: Ejecutar tests con cobertura
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=70

  # ---------------------------------------------------------------------------
  # Fase 3: Build de imágenes Docker
  # ---------------------------------------------------------------------------
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen del productor
        uses: docker/build-push-action@v5
        with:
          context: ./src/producer
          push: false
          tags: spotify-producer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imagen del consumidor
        uses: docker/build-push-action@v5
        with:
          context: ./src/consumer
          push: false
          tags: spotify-consumer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imagen de Airflow
        uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: false
          tags: spotify-airflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
