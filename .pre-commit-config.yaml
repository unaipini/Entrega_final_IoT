# .pre-commit-config.yaml
# Hooks de pre-commit ejecutados automáticamente antes de cada git commit.
# Instalar: pip install pre-commit && pre-commit install
# Ejecutar manualmente sobre todo el proyecto: pre-commit run --all-files

repos:

  # ---------------------------------------------------------------------------
  # Hooks básicos de formato y seguridad de ficheros
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace      # Elimina espacios en blanco al final de línea
      - id: end-of-file-fixer        # Asegura que los ficheros terminen con salto de línea
      - id: check-yaml               # Valida la sintaxis de ficheros YAML
      - id: check-json               # Valida la sintaxis de ficheros JSON
      - id: check-added-large-files  # Impide subir ficheros mayores de 500 KB
      - id: check-merge-conflict     # Detecta marcadores de conflicto de merge sin resolver
      - id: detect-private-key       # Detecta claves privadas hardcodeadas en el código

  # ---------------------------------------------------------------------------
  # Black — formateador de código Python (estilo no negociable)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11

  # ---------------------------------------------------------------------------
  # isort — ordena los imports de Python de forma consistente
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]  # Compatible con Black

  # ---------------------------------------------------------------------------
  # Flake8 — linter de estilo PEP 8
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args:
          - "--max-line-length=100"
          - "--extend-ignore=E203,W503"  # Compatibilidad con Black

  # ---------------------------------------------------------------------------
  # Bandit — análisis de seguridad estático del código Python
  # Detecta: inyecciones SQL, uso de funciones peligrosas (eval, exec),
  # contraseñas hardcodeadas, algoritmos débiles de cifrado, etc.
  # B101: assert usado en tests — se omite porque es válido en test unitarios
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-r", "src/", "--skip", "B101"]
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Gitleaks — detecta credenciales y secretos en el repositorio Git
  # Complementa a Bandit: cubre el historial de commits, no solo el código
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
